name: Daily News Widget Email

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 UTC = 8:30 AM IST (UTC+5:30)
    - cron: '0 16 * * *'  # 16:00 UTC = 9:30 PM IST
  workflow_dispatch:      # Manual trigger bhi option (Actions tab se run kar sakta hai test ke liye)

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run news email script (Morning or Evening)
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python news_email.py
